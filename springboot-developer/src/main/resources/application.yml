spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

    defer-datasource-initialization: true

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "{baseUrl}/api/auth/google/callback"
            scope:
              - email
              - profile

app:
  frontend-redirect-uri: "http://localhost:5173/article"
